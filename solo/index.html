<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo — When Cognition Becomes Cheap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* ═══════════════════════════════════════════
     THEME — Dark
     ═══════════════════════════════════════════ */
  :root, [data-theme="dark"] {
    --solo-bg:#0B0E17; --solo-surface:#1A2036; --solo-border:#2A3352;
    --solo-muted:#6B7A99; --solo-text:#C8D1E0; --solo-bright:#E8ECF4;
    --solo-white:#F8FAFF; --solo-accent:#4F8CFF;
    --solo-accent-glow:rgba(79,140,255,0.15);
    --solo-accent-soft:rgba(79,140,255,0.08);
    --solo-gradient-a:rgba(79,140,255,0.06);
    --solo-gradient-b:rgba(52,211,153,0.04);
    --shadow-card:0 2px 24px rgba(0,0,0,0.25),0 0 0 1px rgba(255,255,255,0.04);
    --shadow-glow:0 0 30px rgba(79,140,255,0.08);
    --solo-green:#34D399; --solo-amber:#FBBF24; --solo-rose:#F472B6;
    --solo-purple:#A78BFA; --solo-cyan:#22D3EE;
    --orch-line:#2A3352; --orch-node-bg:#1A2036; --orch-pulse:rgba(79,140,255,0.35);
  }
  /* ═══════════════════════════════════════════
     THEME — Light
     ═══════════════════════════════════════════ */
  [data-theme="light"] {
    --solo-bg:#F4F6FB; --solo-surface:#FFFFFF; --solo-border:#D8DDE8;
    --solo-muted:#7A839A; --solo-text:#4A5068; --solo-bright:#1E2338;
    --solo-white:#0F1320; --solo-accent:#3B72E0;
    --solo-accent-glow:rgba(59,114,224,0.12);
    --solo-accent-soft:rgba(59,114,224,0.05);
    --solo-gradient-a:rgba(59,114,224,0.05);
    --solo-gradient-b:rgba(40,180,130,0.04);
    --shadow-card:0 2px 20px rgba(0,0,0,0.06),0 0 0 1px rgba(0,0,0,0.04);
    --shadow-glow:0 0 24px rgba(59,114,224,0.08);
    --solo-green:#059669; --solo-amber:#D97706; --solo-rose:#DB2777;
    --solo-purple:#7C3AED; --solo-cyan:#0891B2;
    --orch-line:#D0D5E0; --orch-node-bg:#FFFFFF; --orch-pulse:rgba(59,114,224,0.3);
  }
  :root {
    --radius-card:14px; --radius-img:10px;
    --transition-reveal:0.45s cubic-bezier(0.23,1,0.32,1);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--solo-bg);color:var(--solo-text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
  body::before{content:'';position:fixed;top:-40%;left:-20%;width:80%;height:80%;background:radial-gradient(ellipse,var(--solo-gradient-a) 0%,transparent 70%);pointer-events:none;z-index:0;transition:background .4s}
  body::after{content:'';position:fixed;bottom:-30%;right:-10%;width:60%;height:60%;background:radial-gradient(ellipse,var(--solo-gradient-b) 0%,transparent 70%);pointer-events:none;z-index:0;transition:background .4s}

  #deck{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column}

  /* Top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 48px;flex-shrink:0}
  .topbar-left{display:flex;align-items:center;gap:10px}
  .logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--solo-accent),#7B61FF);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:15px;color:#fff;letter-spacing:-.5px}
  .logo-text{font-size:20px;font-weight:700;color:var(--solo-white);letter-spacing:-.3px;transition:color .3s}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .slide-counter{font-family:'Space Mono',monospace;font-size:13px;color:var(--solo-muted);background:var(--solo-surface);border:1px solid var(--solo-border);border-radius:8px;padding:6px 14px;transition:all .3s}
  .slide-counter .current{color:var(--solo-accent);font-weight:700}
  .theme-toggle{width:40px;height:40px;background:var(--solo-surface);border:1px solid var(--solo-border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .25s;color:var(--solo-muted);font-size:18px;user-select:none}
  .theme-toggle:hover{background:var(--solo-accent-glow);border-color:var(--solo-accent);color:var(--solo-accent)}
  .theme-toggle .icon-sun,.theme-toggle .icon-moon{display:none}
  [data-theme="dark"] .theme-toggle .icon-sun{display:block}
  [data-theme="light"] .theme-toggle .icon-moon{display:block}

  /* Progress */
  .progress-track{height:2px;background:var(--solo-surface);flex-shrink:0;transition:background .3s}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--solo-accent),#7B61FF);transition:width .5s cubic-bezier(.23,1,.32,1);border-radius:0 2px 2px 0}

  /* Slides */
  .slide-viewport{flex:1;position:relative;overflow:hidden}
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 100px;opacity:0;transform:translateY(30px);transition:opacity .5s,transform .5s;pointer-events:none;overflow-y:auto}
  .slide.active{opacity:1;transform:translateY(0);pointer-events:auto}

  /* Slide content */
  .slide-eyebrow{font-family:'Space Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:2.5px;color:var(--solo-accent);margin-bottom:12px}
  .slide-title{font-size:clamp(28px,4vw,50px);font-weight:700;color:var(--solo-white);line-height:1.15;letter-spacing:-1px;max-width:820px;transition:color .3s}
  .slide-subtitle{font-size:clamp(15px,1.6vw,19px);color:var(--solo-muted);margin-top:14px;max-width:640px;line-height:1.55;font-weight:400;transition:color .3s}

  /* Body items */
  .slide-body{margin-top:36px;display:flex;flex-direction:column;gap:12px}
  .slide-item{display:flex;align-items:flex-start;gap:16px;padding:16px 20px;background:var(--solo-accent-soft);border:1px solid transparent;border-radius:var(--radius-card);opacity:.18;transform:translateY(6px);transition:opacity var(--transition-reveal),transform var(--transition-reveal),border-color var(--transition-reveal),background var(--transition-reveal),box-shadow var(--transition-reveal);max-width:700px}
  .slide-item.revealed{opacity:1;transform:translateY(0);border-color:var(--solo-border);background:var(--solo-surface)}
  .slide-item.revealed.current{border-color:var(--solo-accent);background:var(--solo-accent-glow);box-shadow:var(--shadow-glow)}
  .item-icon{width:34px;height:34px;border-radius:9px;background:var(--solo-accent-glow);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;transition:background var(--transition-reveal)}
  .slide-item.revealed.current .item-icon{background:rgba(79,140,255,.25)}
  .item-content h3{font-size:14px;font-weight:600;color:var(--solo-bright);margin-bottom:3px;transition:color .3s}
  .item-content p{font-size:13px;color:var(--solo-muted);line-height:1.5;transition:color .3s}

  /* Image card */
  .slide-image-card{max-width:680px;border-radius:var(--radius-card);overflow:hidden;background:var(--solo-surface);border:1px solid var(--solo-border);box-shadow:var(--shadow-card);opacity:.18;transform:translateY(8px);transition:opacity var(--transition-reveal),transform var(--transition-reveal),background .3s,border-color .3s}
  .slide-image-card.revealed{opacity:1;transform:translateY(0)}
  .slide-image-card img{width:100%;display:block}
  .slide-image-card .img-placeholder{width:100%;height:300px;background:linear-gradient(135deg,var(--solo-accent-soft),rgba(123,97,255,.06));display:flex;align-items:center;justify-content:center;color:var(--solo-muted);font-size:13px;font-family:'Space Mono',monospace}
  .slide-image-card .card-caption{padding:12px 18px;font-size:12px;color:var(--solo-muted);border-top:1px solid var(--solo-border);transition:color .3s,border-color .3s}

  /* Title slide */
  .slide.title-slide{align-items:center;text-align:center;padding:0 60px}
  .slide.title-slide .slide-heading{display:flex;flex-direction:column;align-items:center}
  .slide.title-slide .slide-title{font-size:clamp(34px,5vw,64px);max-width:920px;background:linear-gradient(135deg,var(--solo-white) 30%,var(--solo-accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .slide.title-slide .slide-subtitle{max-width:580px;text-align:center}

  /* ═══════════════════════════════════════════
     ORCHESTRATION FLOW DIAGRAM
     ═══════════════════════════════════════════ */
  .orch-container{
    opacity:.18;transform:translateY(8px);
    transition:opacity var(--transition-reveal),transform var(--transition-reveal);
    max-width:820px;width:100%;
  }
  .orch-container.revealed{opacity:1;transform:translateY(0)}

  .orch-flow{
    display:flex;align-items:flex-start;gap:0;
    padding:28px 24px;
    background:var(--solo-surface);border:1px solid var(--solo-border);
    border-radius:var(--radius-card);box-shadow:var(--shadow-card);
    overflow-x:auto;
    transition:background .3s,border-color .3s;
    position:relative;
  }

  .orch-stage{display:flex;flex-direction:column;align-items:center;min-width:110px;position:relative;z-index:1}
  .orch-node{
    width:88px;height:88px;border-radius:16px;
    background:var(--orch-node-bg);
    border:2px solid var(--solo-border);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;position:relative;
    transition:border-color .4s,background .3s,box-shadow .4s;
  }
  .orch-node .node-icon{font-size:22px;line-height:1}
  .orch-node .node-label{font-size:9px;font-weight:600;color:var(--solo-muted);text-transform:uppercase;letter-spacing:1px;font-family:'Space Mono',monospace;transition:color .3s}
  .orch-stage-label{font-size:10px;color:var(--solo-muted);margin-top:10px;text-align:center;max-width:110px;line-height:1.35;transition:color .3s}

  /* Connector arrows between nodes */
  .orch-connector{
    display:flex;align-items:center;justify-content:center;
    min-width:36px;padding-top:20px;
    position:relative;z-index:0;
  }
  .orch-connector svg{color:var(--solo-border);transition:color .3s}

  /* Branch group (for parallel agents) */
  .orch-branch{display:flex;flex-direction:column;align-items:center;gap:8px}
  .orch-branch-row{display:flex;gap:8px}
  .orch-branch .orch-node{width:72px;height:72px;border-radius:14px}
  .orch-branch .orch-node .node-icon{font-size:18px}
  .orch-branch .orch-node .node-label{font-size:8px}
  .orch-branch-label{font-size:10px;color:var(--solo-muted);margin-top:8px;text-align:center;max-width:180px;line-height:1.35}

  /* Animated pulse on active */
  .orch-container.revealed .orch-node{border-color:var(--solo-accent);box-shadow:0 0 0 0 var(--orch-pulse)}
  .orch-container.revealed.current .orch-node{animation:orchPulse 2s ease-in-out infinite}
  @keyframes orchPulse{
    0%,100%{box-shadow:0 0 0 0 var(--orch-pulse)}
    50%{box-shadow:0 0 0 6px transparent}
  }
  .orch-container.revealed .orch-connector svg{color:var(--solo-accent)}

  /* Human-in-loop badge */
  .hitl-badge{
    position:absolute;top:-8px;right:-8px;
    width:20px;height:20px;border-radius:50%;
    background:var(--solo-green);color:#fff;
    font-size:10px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
  }

  /* Color-coded node borders */
  .orch-container.revealed .node-triage{border-color:var(--solo-amber)}
  .orch-container.revealed .node-analysis{border-color:var(--solo-cyan)}
  .orch-container.revealed .node-agent{border-color:var(--solo-purple)}
  .orch-container.revealed .node-review{border-color:var(--solo-green)}
  .orch-container.revealed .node-execute{border-color:var(--solo-accent)}
  .orch-container.revealed .node-memory{border-color:var(--solo-rose)}

  /* Bottom bar */
  .bottombar{display:flex;align-items:center;justify-content:space-between;padding:14px 48px 20px;flex-shrink:0}
  .nav-hint{font-size:12px;color:var(--solo-muted);font-family:'Space Mono',monospace;display:flex;align-items:center;gap:16px}
  .key-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--solo-surface);border:1px solid var(--solo-border);border-radius:6px;font-size:13px;color:var(--solo-text);margin:0 2px;transition:background .3s,border-color .3s}
  .nav-arrows{display:flex;gap:8px}
  .nav-btn{width:40px;height:40px;background:var(--solo-surface);border:1px solid var(--solo-border);border-radius:10px;color:var(--solo-text);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:18px}
  .nav-btn:hover{background:var(--solo-accent-glow);border-color:var(--solo-accent);color:var(--solo-accent)}
  .nav-btn:active{transform:scale(.94)}
  /* Keep Solo chat bubble clear of nav controls */
  #solo-chat-widget-container{right:24px!important;bottom:74px!important}
  @media (max-width:900px){#solo-chat-widget-container{right:16px!important;bottom:88px!important}}
  @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .topbar,.bottombar{animation:fadeInUp .6s ease forwards}
</style>
</head>
<body>
<div id="deck">
  <div class="topbar">
    <div class="topbar-left"><div class="logo-mark">S—</div><div class="logo-text">Solo — When Cognition Becomes Cheap</div></div>
    <div class="topbar-right">
      <div class="slide-counter"><span class="current" id="counterCurrent">01</span><span> / </span><span id="counterTotal">--</span></div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"><span class="icon-sun">☀️</span><span class="icon-moon">🌙</span></button>
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="slide-viewport" id="slideViewport"></div>
  <div class="bottombar">
    <div class="nav-hint"><span><span class="key-badge">↑</span><span class="key-badge">↓</span> Navigate</span></div>
    <div class="nav-arrows"><button class="nav-btn" id="btnPrev" aria-label="Previous">↑</button><button class="nav-btn" id="btnNext" aria-label="Next">↓</button></div>
  </div>
</div>
<script src="https://solomail.io/chat/widget.js" data-identity="investors" data-mode="bubble" data-position="bottom-right" async></script>

<script>
(function(){

  /* ╔═══════════════════════════════════════════════════════════════════╗
     ║                                                                   ║
     ║   ██  SLIDE CONTENT — EDIT BELOW  ██                              ║
     ║                                                                   ║
     ║   Fields per slide:                                               ║
     ║   layout      "title" | "default"                                 ║
     ║   eyebrow     Small label above title                             ║
     ║   title       Main heading                                        ║
     ║   subtitle    Body paragraph (optional)                           ║
     ║   items[]     Reveal cards: { icon, head, body }                  ║
     ║   image{}     Screenshot: { src, alt, caption }                   ║
     ║   orchestration  true — renders the agent flow diagram            ║
     ║                                                                   ║
     ╚═══════════════════════════════════════════════════════════════════╝ */

  const SLIDES = [

    // ─── 1. Title ───
    {
      layout: "title",
      eyebrow: "Solo · solomail.io",
      title: "When Cognition Becomes Cheap, Workflows Get Rewritten",
      subtitle: "The next enterprise moat is not AI inside legacy software — it is governed agentic workflows in front of the business.",
    },

    // ─── 2. The Human Truth ───
    {
      layout: "default",
      eyebrow: "First Principles",
      title: "Currency was always a proxy for human time and judgment",
      subtitle: "For most of modern history, materially more output required more people, more management, more software seats, and more process. AI changes the cost of cognition itself — and with it, the relationship between labor, software, and output.",
    },

    // ─── 3. PowerPoint Example ───
    {
      layout: "default",
      eyebrow: "The Concrete Example",
      title: "The incumbent workflow is often the product",
      subtitle: "PowerPoint became the default not because slides are magical, but because it standardized a human workflow for collaboration, editing, and presenting information.",
      items: [
        {
          icon: "📊",
          head: "The old assumption",
          body: "\"How do we add AI into PowerPoint?\" — the natural question every incumbent asks first."
        },
        {
          icon: "🔀",
          head: "The deeper shift",
          body: "If a presentation can be created as HTML with the same output at a fraction of the cost, the valuable thing was never the file — it was the workflow PowerPoint standardized."
        },
        {
          icon: "⚡",
          head: "The pattern",
          body: "AI does not just enhance old tools. In many cases, it rewrites the workflow underneath them."
        }
      ]
    },

    // ─── 4. Broader Pattern ───
    {
      layout: "default",
      eyebrow: "The Bigger Picture",
      title: "This is not about one tool. It is about workflow replacement.",
      subtitle: "The market starts by asking how AI can be added to existing software. Over time, the better question is whether the underlying workflow still deserves to exist in its current form.",
      items: [
        {
          icon: "📋",
          head: "Workflows under pressure",
          body: "Presentation building, support triage, onboarding coordination, contract generation, proposal drafting, scheduling, internal approvals, follow-up communication."
        },
        {
          icon: "🎯",
          head: "The real risk for incumbents",
          body: "The threat is not just feature parity. It is workflow displacement — when the process itself gets rewritten around AI."
        }
      ]
    },

    // ─── 5. Waves ───
    {
      layout: "default",
      eyebrow: "Wave Model",
      title: "AI moves through the economy in overlapping waves",
      subtitle: "The economic effect lags the capability effect. Models improve first, then tools get cheaper, then firms adopt, then workflows change, then labor markets and pricing move.",
      items: [
        {
          icon: "1️⃣",
          head: "Copilot wave",
          body: "Existing workers complete current tasks faster using AI assistance."
        },
        {
          icon: "2️⃣",
          head: "Workflow wave",
          body: "Companies redesign processes around AI, not just layer it onto old ones."
        },
        {
          icon: "3️⃣",
          head: "Agent wave",
          body: "Software begins to own multi-step work autonomously with human oversight."
        },
        {
          icon: "4️⃣",
          head: "Compression wave",
          body: "Intelligence-heavy services fall in price as human time per unit of output drops."
        }
      ]
    },

    // ─── 6. Where the Market Is ───
    {
      layout: "default",
      eyebrow: "Market Position",
      title: "We are still early, but no longer at the beginning",
      subtitle: "Most enterprises are no longer asking whether AI matters. They are asking how far and how fast they can operationalize it safely.",
      items: [
        {
          icon: "📈",
          head: "88% regular AI use",
          body: "McKinsey's 2025 survey: 88% of organizations report regular AI use in at least one business function — but most are still piloting, not scaling."
        },
        {
          icon: "🔁",
          head: "Workflow redesign predicts impact",
          body: "McKinsey found workflow redesign was the single strongest predictor of EBIT impact from generative AI."
        },
        {
          icon: "📍",
          head: "Between wave 1 and wave 2",
          body: "The market is broadly between the Copilot wave and the Workflow wave. The structural shift is underway."
        }
      ]
    },

    // ─── 7. Cost Acceleration ───
    {
      layout: "default",
      eyebrow: "Acceleration",
      title: "Capability is rising, but cost is falling even faster",
      subtitle: "This shift is not driven only by smarter models. It is driven by the fact that usable intelligence is becoming dramatically cheaper.",
      items: [
        {
          icon: "📉",
          head: "280x cost reduction",
          body: "Stanford HAI: GPT-3.5-level inference cost fell more than 280-fold between November 2022 and October 2024."
        },
        {
          icon: "⚙️",
          head: "Hardware and efficiency gains",
          body: "Hardware costs declining ~30% annually, energy efficiency improving ~40% per year."
        },
        {
          icon: "💡",
          head: "The implication",
          body: "When capability rises and unit cost falls together, pressure builds to redesign the workflow — not just speed up the old one."
        }
      ]
    },

    // ─── 8. Copilots Are Insufficient ───
    {
      layout: "default",
      eyebrow: "Beyond Copilots",
      title: "AI as a staff tool improves work. AI as workflow infrastructure changes the business.",
      subtitle: "Internal copilots rely on employees knowing when to use them, what to ask, and how to convert output into action. That creates uneven adoption and inconsistent value.",
      items: [
        {
          icon: "🧑‍💻",
          head: "The copilot ceiling",
          body: "Individual productivity gains are real but capped. The tool only works when someone remembers to open it."
        },
        {
          icon: "🏗️",
          head: "The infrastructure opportunity",
          body: "Place an agentic layer in front of the work itself — where inbound communication, triage, coordination, and drafting are already repetitive."
        }
      ]
    },

    // ─── 9. Seats to Outcomes ───
    {
      layout: "default",
      eyebrow: "Enterprise Software Shift",
      title: "Enterprise software is moving from seats to outcomes",
      subtitle: "As workflows are rewritten, value shifts from static software access toward measured operational output.",
      items: [
        {
          icon: "🔮",
          head: "2027–2031 prediction",
          body: "More categories will be pressured from per-seat pricing toward outcome-linked logic: per resolved ticket, per qualified lead, per claim processed, per workflow completed."
        },
        {
          icon: "🏰",
          head: "The new moat",
          body: "If the workflow becomes the product, then the system that governs the workflow becomes the moat."
        }
      ]
    },

    // ─── 10. Early Adopters ───
    {
      layout: "default",
      eyebrow: "Target Market",
      title: "The first winners are companies with heavy communication and coordination load",
      subtitle: "The strongest early adopters are enterprise software businesses with large installed bases, support burden, fragmented product knowledge, and margin pressure from people-heavy operations.",
      items: [

  /* ═══════════════════════════════════════════
     Build DOM
     ═══════════════════════════════════════════ */
  const viewport = document.getElementById('slideViewport');
  const arrow = `<svg width="24" height="16" viewBox="0 0 24 16" fill="none"><path d="M1 8h20M16 2l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  SLIDES.forEach((s, si) => {
    const isTitle = s.layout === 'title';
    const el = document.createElement('div');
    el.className = 'slide' + (isTitle ? ' title-slide' : '');
    el.dataset.slide = si;

    let h = '<div class="slide-heading">';
    if (s.eyebrow) h += `<div class="slide-eyebrow">${esc(s.eyebrow)}</div>`;
    h += `<h1 class="slide-title">${esc(s.title)}</h1>`;
    if (s.subtitle) h += `<p class="slide-subtitle">${esc(s.subtitle)}</p>`;
    h += '</div>';

    const hasItems = s.items && s.items.length;
    const hasImage = s.image;
    const hasOrch = s.orchestration;
    let revealIdx = 0;

    if (hasItems || hasImage || hasOrch) {
      h += `<div class="slide-body"${isTitle ? ' style="align-items:center;"' : ''}>`;

      if (hasItems) {
        s.items.forEach((item) => {
          h += `<div class="slide-item" data-item="${revealIdx}"${isTitle ? ' style="max-width:420px;"' : ''}>
            <div class="item-icon">${item.icon}</div>
            <div class="item-content"><h3>${esc(item.head)}</h3><p>${esc(item.body)}</p></div>
          </div>`;
          revealIdx++;
        });
      }

      if (hasOrch) {
        h += buildOrchestration(revealIdx);
        revealIdx++;
      }

      if (hasImage) {
        const img = s.image;
        h += `<div class="slide-image-card" data-item="${revealIdx}">`;
        if (img.src) h += `<img src="${esc(img.src)}" alt="${esc(img.alt)}" />`;
        else h += `<div class="img-placeholder">[ ${esc(img.alt)} ]</div>`;
        if (img.caption) h += `<div class="card-caption">${esc(img.caption)}</div>`;
        h += '</div>';
        revealIdx++;
      }

      h += '</div>';
    }

    el.innerHTML = h;
    viewport.appendChild(el);
  });

  function buildOrchestration(idx) {
    return `
    <div class="orch-container" data-item="${idx}">
      <div class="orch-flow">

        <!-- Inbound -->
        <div class="orch-stage">
          <div class="orch-node node-triage">
            <span class="node-icon">📨</span>
            <span class="node-label">Inbound</span>
          </div>
          <div class="orch-stage-label">Email, SMS, LinkedIn, Calendar</div>
        </div>

        <div class="orch-connector">${arrow}</div>

        <!-- Sentinel / Triage -->
        <div class="orch-stage">
          <div class="orch-node node-triage">
            <span class="node-icon">🔍</span>
            <span class="node-label">Sentinel</span>
          </div>
          <div class="orch-stage-label">Triage, classify, route</div>
        </div>

        <div class="orch-connector">${arrow}</div>

        <!-- Agent Branch -->
        <div class="orch-branch">
          <div class="orch-branch-row">
            <div class="orch-node node-agent">
              <span class="node-icon">📬</span>
              <span class="node-label">Email</span>
            </div>
            <div class="orch-node node-agent">
              <span class="node-icon">📅</span>
              <span class="node-label">Schedule</span>
            </div>
            <div class="orch-node node-agent">
              <span class="node-icon">🔎</span>
              <span class="node-label">Research</span>
            </div>
          </div>
          <div class="orch-branch-row">
            <div class="orch-node node-analysis">
              <span class="node-icon">📝</span>
              <span class="node-label">Draft</span>
            </div>
            <div class="orch-node node-memory">
              <span class="node-icon">🧠</span>
              <span class="node-label">Memory</span>
            </div>
            <div class="orch-node node-analysis">
              <span class="node-icon">📄</span>
              <span class="node-label">Docs</span>
            </div>
          </div>
          <div class="orch-branch-label">Specialized agents execute in parallel</div>
        </div>

        <div class="orch-connector">${arrow}</div>

        <!-- Human Review -->
        <div class="orch-stage">
          <div class="orch-node node-review">
            <div class="hitl-badge">✓</div>
            <span class="node-icon">👤</span>
            <span class="node-label">Review</span>
          </div>
          <div class="orch-stage-label">Human-in-the-loop approval</div>
        </div>

        <div class="orch-connector">${arrow}</div>

        <!-- Execute / Send -->
        <div class="orch-stage">
          <div class="orch-node node-execute">
            <span class="node-icon">🚀</span>
            <span class="node-label">Execute</span>
          </div>
          <div class="orch-stage-label">Send, update, complete</div>
        </div>

      </div>
    </div>`;
  }

  function esc(str) {
    return str.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ═══════════════════════════════════════════
     Navigation
     ═══════════════════════════════════════════ */
  const slides = document.querySelectorAll('.slide');
  const totalSlides = slides.length;
  let currentSlide = 0, currentItem = -1, transitioning = false;

  const counterCurrent = document.getElementById('counterCurrent');
  const counterTotal = document.getElementById('counterTotal');
  const progressFill = document.getElementById('progressFill');
  counterTotal.textContent = String(totalSlides).padStart(2,'0');

  function getItems(si){
    return slides[si].querySelectorAll('.slide-item, .slide-image-card, .orch-container');
  }

  function render(){
    slides.forEach((s,i) => s.classList.toggle('active', i === currentSlide));
    const items = getItems(currentSlide);
    items.forEach((item,i) => {
      item.classList.remove('revealed','current');
      if(i <= currentItem){
        item.classList.add('revealed');
        if(i === currentItem) item.classList.add('current');
      }
    });
    counterCurrent.textContent = String(currentSlide+1).padStart(2,'0');
    const sp = currentSlide / totalSlides;
    const ip = items.length > 0 ? ((currentItem+1)/(items.length+1))/totalSlides : 0;
    progressFill.style.width = ((sp+ip)*100)+'%';
  }

  function next(){
    if(transitioning) return;
    const items = getItems(currentSlide);
    if(currentItem < items.length-1){currentItem++;render()}
    else if(currentSlide < totalSlides-1){
      transitioning=true;currentSlide++;currentItem=-1;
      render();setTimeout(()=>transitioning=false,500);
    }
  }
  function prev(){
    if(transitioning) return;
    if(currentItem >= 0){currentItem--;render()}
    else if(currentSlide > 0){
      transitioning=true;currentSlide--;
      currentItem=getItems(currentSlide).length-1;
      render();setTimeout(()=>transitioning=false,500);
    }
  }

  document.addEventListener('keydown',(e)=>{
    if(e.key==='ArrowDown'||e.key===' '||e.key==='ArrowRight'){e.preventDefault();next()}
    else if(e.key==='ArrowUp'||e.key==='ArrowLeft'){e.preventDefault();prev()}
  });
  document.getElementById('btnNext').addEventListener('click',next);
  document.getElementById('btnPrev').addEventListener('click',prev);

  let touchStartY=0;
  document.addEventListener('touchstart',(e)=>{touchStartY=e.touches[0].clientY},{passive:true});
  document.addEventListener('touchend',(e)=>{
    const dy=touchStartY-e.changedTouches[0].clientY;
    if(Math.abs(dy)>40) dy>0?next():prev();
  },{passive:true});

  render();

  /* Theme Toggle */
  document.getElementById('themeToggle').addEventListener('click',()=>{
    const html=document.documentElement;
    html.setAttribute('data-theme',html.getAttribute('data-theme')==='dark'?'light':'dark');
  });

})();
</script>
