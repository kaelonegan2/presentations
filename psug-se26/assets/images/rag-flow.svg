<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="RAG open book flow">
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="80" y="95" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">RAG: Open-Book AI</text>
  <g font-family="Inter, Arial, sans-serif" font-size="24" fill="#e5e7eb">
    <rect x="80" y="200" width="220" height="120" rx="14" fill="#1f2937"/><text x="145" y="270">Question</text>
    <rect x="350" y="200" width="260" height="120" rx="14" fill="#0b3a4f"/><text x="420" y="270">Retrieve</text>
    <rect x="660" y="200" width="220" height="120" rx="14" fill="#1f2937"/><text x="705" y="270">Context</text>
    <rect x="930" y="200" width="190" height="120" rx="14" fill="#0b3a4f"/><text x="970" y="270">Answer</text>
  </g>
  <g stroke="#38bdf8" stroke-width="5" fill="none">
    <path d="M300 260 L350 260"/>
    <path d="M610 260 L660 260"/>
    <path d="M880 260 L930 260"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" fill="#93c5fd">
    <text x="350" y="400" font-size="22">Trusted sources</text>
    <text x="350" y="440" font-size="20">- Policies  - FAQs  - Support notes</text>
    <text x="350" y="474" font-size="20">- Data dictionaries  - Process docs</text>
  </g>
</svg>
