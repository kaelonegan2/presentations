<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Attention weights explained">
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="80" y="90" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="34" font-weight="700">Attention Picks What Matters Most</text>

  <g font-family="Arial, sans-serif" font-size="34" fill="#e5e7eb">
    <text x="90" y="220">The student submitted the</text>
    <text x="500" y="220" fill="#93c5fd">form</text>
    <text x="620" y="220">, but</text>
    <text x="760" y="220" fill="#5eead4">it</text>
    <text x="810" y="220">was incomplete.</text>
  </g>

  <text x="90" y="315" fill="#9ca3af" font-family="Arial, sans-serif" font-size="22">Current token: it. The model scores earlier words for relevance.</text>

  <g font-family="Arial, sans-serif">
    <text x="90" y="410" fill="#e5e7eb" font-size="22">weight(form)</text>
    <rect x="270" y="386" width="520" height="36" rx="8" fill="#1f2937"/>
    <rect x="270" y="386" width="470" height="36" rx="8" fill="#5eead4"/>
    <text x="750" y="410" fill="#0f172a" font-size="18" font-weight="700">high</text>

    <text x="90" y="480" fill="#e5e7eb" font-size="22">weight(student)</text>
    <rect x="270" y="456" width="520" height="36" rx="8" fill="#1f2937"/>
    <rect x="270" y="456" width="150" height="36" rx="8" fill="#93c5fd"/>
    <text x="430" y="480" fill="#0f172a" font-size="18" font-weight="700">lower</text>
  </g>

  <text x="90" y="600" fill="#94a3b8" font-family="Arial, sans-serif" font-size="21">Light math: score = (Q dot K) / sqrt(dk). Softmax turns scores into weights.</text>
</svg>
