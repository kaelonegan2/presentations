<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Context spotlight and window comparison">
  <rect width="1200" height="700" fill="#0b1120"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="80" y="90" fill="#e2e8f0" font-size="34" font-weight="700">Context = What the Model Can See</text>
    <rect x="80" y="140" width="500" height="480" rx="18" fill="#111827" stroke="#334155"/>
    <text x="120" y="185" fill="#93c5fd" font-size="24">Small context window</text>
    <rect x="120" y="220" width="420" height="120" rx="12" fill="#1f2937"/>
    <text x="140" y="285" fill="#e5e7eb" font-size="22">Prompt + short history</text>
    <text x="120" y="385" fill="#9ca3af" font-size="20">Limited view, limited evidence</text>

    <rect x="620" y="140" width="500" height="480" rx="18" fill="#111827" stroke="#334155"/>
    <text x="660" y="185" fill="#5eead4" font-size="24">Large context window</text>
    <rect x="660" y="220" width="420" height="300" rx="12" fill="#1f2937"/>
    <text x="680" y="280" fill="#e5e7eb" font-size="22">Prompt + long history + docs</text>
    <text x="680" y="320" fill="#e5e7eb" font-size="22">Policies + retrieved references</text>
    <text x="660" y="560" fill="#9ca3af" font-size="20">More relevant evidence in view</text>
  </g>
</svg>
