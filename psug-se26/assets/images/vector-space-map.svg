  <g opacity="0.18">
    <circle cx="350" cy="380" r="210" fill="#3b82f6"/>
    <circle cx="710" cy="300" r="180" fill="#14b8a6"/>
    <circle cx="930" cy="470" r="170" fill="#f59e0b"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="24" fill="#f8fafc">
