<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Simple attention weights example">
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="80" y="90" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Attention Picks What Matters Most</text>

  <g font-family="Inter, Arial, sans-serif" font-size="34" fill="#e5e7eb">
    <text x="90" y="230">The student submitted the</text>
    <text x="500" y="230" fill="#93c5fd">form</text>
    <text x="620" y="230">, but</text>
    <text x="760" y="230" fill="#5eead4">it</text>
    <text x="810" y="230">was incomplete.</text>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <text x="90" y="340" fill="#9ca3af" font-size="22">Current token: "it"  ’  model scores earlier words</text>

    <text x="90" y="430" fill="#e5e7eb" font-size="22">weight("form")</text>
    <rect x="260" y="406" width="520" height="36" rx="8" fill="#1f2937"/>
    <rect x="260" y="406" width="470" height="36" rx="8" fill="#5eead4"/>
    <text x="740" y="430" fill="#0f172a" font-size="18" font-weight="700">high</text>

    <text x="90" y="500" fill="#e5e7eb" font-size="22">weight("student")</text>
    <rect x="260" y="476" width="520" height="36" rx="8" fill="#1f2937"/>
    <rect x="260" y="476" width="150" height="36" rx="8" fill="#93c5fd"/>
    <text x="420" y="500" fill="#0f172a" font-size="18" font-weight="700">lower</text>
  </g>

  <text x="90" y="610" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="21">Simplified math: score = (Q · K) / sqrt(dk), then softmax turns scores into usable weights.</text>
</svg>
